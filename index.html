<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f13">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="QR受付">
  <title>QR受付 | S.O.P. Dance School</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
  <style>
    /* touch-action:manipulation で二重タップ拡大を全体で無効化 */
    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #0f0f13;
      color: #f0f0f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── ヘッダー ── */
    header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid #1e1e2e;
      flex-shrink: 0;
    }
    .hd-school { font-size: 0.6rem; letter-spacing: 0.15em; color: #5050a0; text-transform: uppercase; }
    .hd-title  { font-size: 1rem; font-weight: 700; color: #c0c0e0; margin-top: 2px; display: flex; align-items: center; gap: 6px; }
    .cache-dot { width: 7px; height: 7px; border-radius: 50%; background: #303050; flex-shrink: 0; transition: background 0.4s; }
    .cache-dot.ready { background: #40c070; }
    .hd-time   { text-align: right; }
    .hd-date   { font-size: 0.65rem; color: #5050a0; }
    .hd-clock  { font-size: 1.25rem; font-weight: 700; color: #7c6fff; font-variant-numeric: tabular-nums; }

    /* ── モードタブ ── */
    .mode-tabs {
      width: 100%; display: flex;
      border-bottom: 1px solid #1e1e2e;
    }
    .mode-tab {
      flex: 1; padding: 10px;
      font-size: 0.85rem; font-weight: 600;
      text-align: center; cursor: pointer;
      color: #5050a0; background: none; border: none;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .mode-tab.active { color: #7c6fff; border-bottom-color: #7c6fff; }

    /* ── メイン ── */
    .main {
      flex: 1; width: 100%;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 14px 16px; gap: 12px;
    }

    /* ── カメラ ── */
    .camera-wrap {
      position: relative; width: 100%; max-width: 370px;
      aspect-ratio: 1; border-radius: 16px; overflow: hidden;
      background: #1a1a24; border: 2px solid #2a2a3a;
    }
    #video { width: 100%; height: 100%; object-fit: cover; display: block; }

    .scan-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .scan-frame { width: 60%; aspect-ratio: 1; position: relative; }
    .scan-frame::before, .scan-frame::after,
    .scan-frame > span::before, .scan-frame > span::after {
      content: ''; position: absolute; width: 24px; height: 24px;
      border-color: #7c6fff; border-style: solid;
    }
    .scan-frame::before  { top:0;    left:0;  border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
    .scan-frame::after   { top:0;    right:0; border-width:3px 3px 0 0; border-radius:0 4px 0 0; }
    .scan-frame > span::before { bottom:0; left:0;  border-width:0 0 3px 3px; border-radius:0 0 0 4px; }
    .scan-frame > span::after  { bottom:0; right:0; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }
    .scan-line { display: none; }

    #btnFlip {
      position: absolute; top: 10px; right: 10px;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(15,15,19,0.6); border: 1px solid #3a3a5a;
      color: #a0a0c0; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px); z-index: 10;
    }
    #btnFlip svg { width: 20px; height: 20px; }
    #btnFlip:active { background: rgba(124,111,255,0.4); }

    /* ── ステータス ── */
    .status { font-size: 0.82rem; color: #6060a0; text-align: center; min-height: 1.5em; }
    .status.error { color: #d06060; }

    /* ── 手入力パネル ── */
    #manualPanel {
      width: 100%; max-width: 370px;
      display: none; flex-direction: column; gap: 12px;
    }

    /* サブタブ（番号 / 名前） */
    .sub-tabs {
      display: flex; border-radius: 10px; overflow: hidden;
      border: 1px solid #2a2a3a;
    }
    .sub-tab {
      flex: 1; padding: 9px;
      font-size: 0.8rem; font-weight: 600;
      text-align: center; cursor: pointer;
      color: #5050a0; background: #1a1a24; border: none;
      transition: color 0.2s, background 0.2s;
    }
    .sub-tab.active { color: #fff; background: #7c6fff; }
    .sub-tab:first-child { border-right: 1px solid #2a2a3a; }

    /* ── 番号入力ペイン ── */
    .num-display {
      background: #1a1a24; border: 2px solid #2a2a3a;
      border-radius: 12px; padding: 14px 18px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .num-display label { font-size: 0.65rem; color: #5050a0; text-transform: uppercase; letter-spacing: 0.1em; }
    .num-digits {
      font-size: 2rem; font-weight: 800; letter-spacing: 0.25em;
      color: #7c6fff; min-height: 2.5rem; font-variant-numeric: tabular-nums;
    }
    .num-digits.complete { color: #60d080; }
    .num-name  { font-size: 0.9rem; color: #c0c0e0; min-height: 1.4em; }
    .num-hint  { font-size: 0.7rem; color: #404060; }

    .numpad {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .key {
      background: #1a1a24; border: 1px solid #2a2a3a;
      border-radius: 10px; padding: 16px 0;
      font-size: 1.4rem; font-weight: 600; color: #c0c0e0;
      cursor: pointer; text-align: center; user-select: none;
      -webkit-user-select: none;
      transition: background 0.08s;
    }
    .key:active { background: #2a2a4a; }
    .key.zero  { grid-column: 1; }
    .key.del   { font-size: 1.1rem; color: #7060a0; }
    .key.empty { background: none; border: none; pointer-events: none; }

    .manual-actions {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .btn-submit {
      padding: 14px; border-radius: 12px; border: none;
      background: #7c6fff; color: #fff;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-submit:disabled { opacity: 0.3; cursor: default; }
    .btn-submit:not(:disabled):active { opacity: 0.8; }
    .btn-clear {
      padding: 14px; border-radius: 12px;
      border: 1px solid #3a3a5a; background: none;
      color: #6060a0; font-size: 0.9rem; cursor: pointer;
    }
    .btn-clear:active { background: #1a1a24; }

    /* ── 名前検索ペイン ── */
    #namePane { display: flex; flex-direction: column; gap: 10px; }

    .name-search-box {
      background: #1a1a24; border: 2px solid #2a2a3a;
      border-radius: 12px; padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .name-search-box:focus-within { border-color: #7c6fff; }
    .name-search-box span { font-size: 1.1rem; color: #5050a0; flex-shrink: 0; }
    #nameInput {
      flex: 1; background: none; border: none; outline: none;
      font-size: 1.05rem; color: #e0e0f0;
      font-family: inherit;
    }
    #nameInput::placeholder { color: #404060; }
    #nameClear {
      background: none; border: none; color: #404060;
      font-size: 1.2rem; cursor: pointer; padding: 2px 4px;
      display: none;
    }
    #nameClear.show { display: block; }

    .name-results { display: flex; flex-direction: column; gap: 6px; max-height: 320px; overflow-y: auto; }
    .name-result {
      background: #1a1a24; border: 1px solid #2a2a3a;
      border-radius: 10px; padding: 12px 14px; cursor: pointer;
      display: flex; flex-direction: column; gap: 3px;
      transition: border-color 0.15s, background 0.15s;
    }
    .name-result:active { background: #2a2a4a; border-color: #7c6fff; }
    .nr-name { font-size: 1rem; font-weight: 700; color: #e0e0f0; }
    .nr-kana { font-size: 0.78rem; color: #7060a0; }
    .nr-id   { font-size: 0.72rem; color: #404060; }
    .name-msg { font-size: 0.82rem; color: #404060; text-align: center; padding: 20px 0; }
    .name-subhint { display: none; font-size: 0.78rem; color: #404060; padding: 0 4px; }

    /* ── 最後の会員カード ── */
    .last-card {
      width: 100%; max-width: 370px;
      background: #1a1a24; border-radius: 12px;
      padding: 12px 16px; border: 1px solid #2a2a3a;
      display: flex; flex-direction: column; gap: 3px;
    }
    .last-card label { font-size: 0.65rem; color: #5050a0; text-transform: uppercase; letter-spacing: 0.1em; }
    .last-name   { font-size: 1rem; font-weight: 700; color: #e0e0f0; }
    .last-member { font-size: 0.75rem; color: #6060a0; }
    .counter { font-size: 0.72rem; color: #404060; }

    footer { font-size: 0.65rem; color: #252540; padding: 10px; letter-spacing: 0.05em; }

    /* ── 50音キーボード（デフォルト非表示・iPad専用） ── */
    #kana-keyboard {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 322px;
      background: #0a0a12;
      border-top: 2px solid #252538;
      padding: 10px 14px 14px;
      z-index: 150;
    }
    #kana-keyboard.visible { display: block; }

    .kana-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: 6px;
      height: 100%;
    }
    .kana-key {
      background: #1e1e2e; border: 1px solid #2a2a3a; border-radius: 8px;
      color: #d0d0f0; font-size: clamp(1.05rem, 2.4vw, 1.5rem); font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-family: inherit; padding: 0; user-select: none; -webkit-user-select: none;
      transition: background 0.08s;
    }
    .kana-key:active   { background: #3a3a5a; }
    .kana-key.empty    { background: transparent; border: none; pointer-events: none; }
    .kana-key.special  { background: #20202e; color: #9080c0; font-size: clamp(1rem, 2vw, 1.3rem); }
    .kana-key.kana-del { background: #20202e; color: #c08080; font-size: clamp(1rem, 2vw, 1.3rem); }
    .kana-key.kana-clr { background: #20202e; color: #707088; font-size: clamp(0.7rem, 1.4vw, 0.95rem); font-weight: 700; }
    .kana-key.kana-del:active, .kana-key.kana-clr:active { background: #2e2e3e; }

    /* ── 確認モーダル ── */
    #confirm-overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(10,10,18,0.88);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      z-index: 190; padding: 32px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.18s ease;
    }
    #confirm-overlay.visible { opacity: 1; pointer-events: auto; }

    .cf-box {
      width: 100%; max-width: 340px;
      background: #1a1a24; border: 1px solid #2a2a3a;
      border-radius: 20px; padding: 28px 24px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .cf-label { font-size: 0.7rem; color: #5050a0; letter-spacing: 0.12em; text-transform: uppercase; }
    .cf-name  { font-size: clamp(1.4rem, 7vw, 2rem); font-weight: 800; color: #fff; text-align: center; line-height: 1.3; }
    .cf-id    { font-size: 0.8rem; color: #5050a0; }
    .cf-btns  { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .cf-ok {
      padding: 15px; border-radius: 12px; border: none;
      background: #7c6fff; color: #fff;
      font-size: 1rem; font-weight: 700; cursor: pointer;
    }
    .cf-ok:active { opacity: 0.8; }
    .cf-cancel {
      padding: 15px; border-radius: 12px;
      border: 1px solid #3a3a5a; background: none;
      color: #6060a0; font-size: 0.95rem; cursor: pointer;
    }
    .cf-cancel:active { background: #1e1e2e; }

    /* ── フラッシュ ── */
    .flash { position: fixed; inset: 0; background: #7c6fff; opacity: 0; pointer-events: none; z-index: 100; }
    .flash.active { animation: flashAnim 0.25s ease-out forwards; }
    @keyframes flashAnim { 0%{ opacity:0.4; } 100%{ opacity:0; } }

    /* ── 結果オーバーレイ ── */
    #result-overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(10,10,18,0.93);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      z-index: 200; padding: 32px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    #result-overlay.visible { opacity:1; pointer-events:auto; }

    .ov-icon {
      width: 64px; height: 64px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px;
      animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .ov-icon.ok  { background:#7c6fff; box-shadow:0 0 40px #7c6fff80; }
    .ov-icon.err { background:#6f2020; box-shadow:0 0 40px #6f202080; }
    .ov-icon svg { width:32px; height:32px; stroke:#fff; stroke-width:3; fill:none; stroke-linecap:round; stroke-linejoin:round; }
    @keyframes popIn { 0%{transform:scale(0.5);opacity:0;} 100%{transform:scale(1);opacity:1;} }

    .ov-label { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; }
    .ov-label.ok  { color: #7c6fff; }
    .ov-label.err { color: #d06060; }

    .ov-name {
      font-size: clamp(2rem, 10vw, 3.2rem);
      font-weight: 800; color: #fff;
      text-align: center; line-height: 1.2; margin-bottom: 10px;
    }
    .ov-meta { font-size: 1rem; color: #6060a0; text-align: center; }
    .ov-welcome { margin-top: 16px; font-size: clamp(1rem, 4vw, 1.4rem); font-weight: 700; color: #c0f0d0; text-align: center; }
    .ov-sub { margin-top: 8px; font-size: 0.78rem; color: #404060; text-align: center; min-height: 1.2em; }
    .ov-hint { margin-top: 24px; font-size: 0.7rem; color: #303050; }

    .ov-progress {
      position: absolute; bottom:0; left:0;
      height: 3px; background: #7c6fff;
      width: 100%; transform-origin: left;
    }
    .ov-progress.run { animation: shrink var(--dur, 3s) linear forwards; }
    @keyframes shrink { 0%{transform:scaleX(1);} 100%{transform:scaleX(0);} }

    /* ═══════════════════════════════════════════════════════
       iPad レイアウト（768px 以上）
       ─ スマホ CSS は上書きせず、必要な箇所のみ追加・拡張
    ═══════════════════════════════════════════════════════ */
    @media (min-width: 768px) {

      /* ── ヘッダー ── */
      header       { padding: 18px 40px; }
      .hd-school   { font-size: 0.8rem; }
      .hd-title    { font-size: 1.35rem; gap: 8px; }
      .hd-date     { font-size: 0.8rem; }
      .hd-clock    { font-size: 2rem; }
      .cache-dot   { width: 10px; height: 10px; }

      /* ── モードタブ ── */
      .mode-tab { padding: 16px 24px; font-size: 1rem; letter-spacing: 0.04em; }

      /* ── メイン：2カラムグリッド ──
         左列（1fr）：QRパネル or 手入力パネル
         右列（360px）：最後の受付カード + カウンター
      ── */
      .main {
        display: grid;
        grid-template-columns: 1fr 360px;
        align-items: start;
        gap: 24px 32px;
        padding: 28px 40px;
        max-width: 1200px;
        margin: 0 auto;
      }

      #qrPanel     { grid-column: 1; grid-row: 1 / span 2; max-width: none; align-items: flex-start; }
      #manualPanel { grid-column: 1; grid-row: 1 / span 2; max-width: none; }
      .last-card   { grid-column: 2; grid-row: 1; max-width: none; padding: 20px 24px; gap: 6px; }
      .counter     { grid-column: 2; grid-row: 2; font-size: 0.88rem; }

      /* ── カメラ ── */
      .camera-wrap { max-width: 100%; border-radius: 20px; border-width: 3px; }
      #btnFlip     { width: 54px; height: 54px; top: 16px; right: 16px; }
      #btnFlip svg { width: 28px; height: 28px; }
      .status      { font-size: 1rem; margin-top: 6px; }

      /* スキャン枠の角を少し大きく */
      .scan-frame::before, .scan-frame::after,
      .scan-frame > span::before, .scan-frame > span::after {
        width: 32px; height: 32px; border-width: 4px !important;
      }

      /* ── 最後の会員カード ── */
      .last-card label { font-size: 0.75rem; }
      .last-name       { font-size: 1.4rem; }
      .last-member     { font-size: 0.9rem; }

      /* ── サブタブ ── */
      .sub-tab { padding: 14px 10px; font-size: 0.95rem; }

      /* ── 番号入力 ── */
      .num-display    { padding: 18px 24px; border-radius: 14px; }
      .num-digits     { font-size: 3rem; letter-spacing: 0.3em; }
      .num-name       { font-size: 1.1rem; min-height: 1.6em; }
      .num-hint       { font-size: 0.82rem; }

      /* ── テンキー：立ったまま操作しやすいサイズ ── */
      .numpad { gap: 12px; }
      .key {
        padding: 24px 0;
        font-size: 1.8rem;
        border-radius: 14px;
        border-width: 2px;
      }
      .key.del   { font-size: 1.4rem; }

      /* ── 送信・クリアボタン ── */
      .manual-actions { gap: 12px; margin-top: 4px; }
      .btn-submit     { padding: 20px; font-size: 1.15rem; border-radius: 14px; }
      .btn-clear      { padding: 20px; font-size: 1rem;    border-radius: 14px; }

      /* ── 名前検索 ── */
      #namePane        { gap: 14px; }
      .name-subhint    { display: block; }
      .name-search-box { padding: 16px 22px; border-radius: 16px; border-width: 2px; }
      #nameInput       { font-size: 1.3rem; }
      .name-search-box span { font-size: 1.3rem; }
      #nameClear       { font-size: 1.4rem; }

      .name-results  { max-height: 52dvh; gap: 10px; }
      .name-result   { padding: 18px 22px; border-radius: 14px; gap: 5px; }
      .name-result:active { border-width: 2px; }
      .nr-name { font-size: 1.25rem; }
      .nr-kana { font-size: 0.92rem; }
      .nr-id   { font-size: 0.84rem; margin-top: 2px; }
      .name-msg { font-size: 0.95rem; padding: 32px 0; }

      /* ── 確認モーダル ── */
      .cf-box    { max-width: 520px; padding: 44px 40px; gap: 14px; border-radius: 24px; }
      .cf-label  { font-size: 0.8rem; }
      .cf-name   { font-size: 2.6rem; }
      .cf-id     { font-size: 0.95rem; }
      .cf-btns   { gap: 14px; margin-top: 18px; }
      .cf-ok     { padding: 22px; font-size: 1.15rem; border-radius: 14px; }
      .cf-cancel { padding: 22px; font-size: 1.05rem; border-radius: 14px; }

      /* ── 結果オーバーレイ ── */
      .ov-icon    { width: 88px; height: 88px; margin-bottom: 24px; }
      .ov-icon svg { width: 44px; height: 44px; }
      .ov-name    { font-size: clamp(2.8rem, 6vw, 4.5rem); margin-bottom: 14px; }
      .ov-meta    { font-size: 1.2rem; }
      .ov-welcome { font-size: clamp(1.2rem, 3vw, 1.8rem); margin-top: 22px; }
      .ov-sub     { font-size: 0.9rem; margin-top: 10px; }
      .ov-hint    { margin-top: 32px; font-size: 0.8rem; }

      /* キーボード表示時：コンテンツが隠れないよう下余白 */
      body.kb-open { padding-bottom: 322px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="hd-school">S.O.P. Dance School</div>
    <div class="hd-title">
      QR受付
      <span class="cache-dot" id="cacheDot" title="会員データ読込中…"></span>
    </div>
  </div>
  <div class="hd-time">
    <div class="hd-date"  id="hdDate">---</div>
    <div class="hd-clock" id="hdClock">--:--</div>
  </div>
</header>

<div class="mode-tabs">
  <button class="mode-tab active" id="tabQr"     onclick="switchMode('qr')">📷 QRスキャン</button>
  <button class="mode-tab"        id="tabManual" onclick="switchMode('manual')">🔢 手入力</button>
</div>

<div class="main">

  <!-- QRモード -->
  <div id="qrPanel" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:12px;">
    <div class="camera-wrap">
      <video id="video" autoplay muted playsinline></video>
      <div class="scan-overlay">
        <div class="scan-frame"><span></span><div class="scan-line"></div></div>
      </div>
      <button id="btnFlip" onclick="flipCamera()" title="カメラ切り替え">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 7h-3a2 2 0 0 0-2-2H9a2 2 0 0 0-2 2H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </button>
    </div>
    <p class="status" id="status">カメラを起動中…</p>
  </div>

  <!-- 手入力モード -->
  <div id="manualPanel">

    <!-- サブタブ -->
    <div class="sub-tabs">
      <button class="sub-tab active" id="subTabNum"  onclick="switchSubMode('num')">🔢 番号入力</button>
      <button class="sub-tab"        id="subTabName" onclick="switchSubMode('name')">🔤 名前検索</button>
    </div>

    <!-- 番号入力ペイン -->
    <div id="numPane">
      <div class="num-display">
        <label>会員番号（6桁）</label>
        <div class="num-digits" id="numDigits">_ _ _ _ _ _</div>
        <div class="num-name"   id="numName"></div>
        <div class="num-hint"   id="numHint">テンキーで入力してください</div>
      </div>

      <div class="numpad">
        <button class="key" onclick="kInput('7')">7</button>
        <button class="key" onclick="kInput('8')">8</button>
        <button class="key" onclick="kInput('9')">9</button>
        <button class="key" onclick="kInput('4')">4</button>
        <button class="key" onclick="kInput('5')">5</button>
        <button class="key" onclick="kInput('6')">6</button>
        <button class="key" onclick="kInput('1')">1</button>
        <button class="key" onclick="kInput('2')">2</button>
        <button class="key" onclick="kInput('3')">3</button>
        <button class="key zero" onclick="kInput('0')">0</button>
        <button class="key empty"></button>
        <button class="key del"  onclick="kDel()">⌫</button>
      </div>

      <div class="manual-actions">
        <button class="btn-submit" id="btnSubmit" onclick="handleManualSubmit()" disabled>出席を記録 ✓</button>
        <button class="btn-clear"  onclick="kClear()">クリア</button>
      </div>
    </div>

    <!-- 名前検索ペイン -->
    <div id="namePane" style="display:none;">
      <div class="name-search-box">
        <span>🔍</span>
        <input id="nameInput" type="search" inputmode="search" autocomplete="off" autocorrect="off"
               spellcheck="false" placeholder="ふりがなで検索（例：こやま）" oninput="onNameInput()">
        <button id="nameClear" onclick="clearNameSearch()">✕</button>
      </div>
      <p class="name-subhint" id="nameSubhint">姓のふりがなで検索します</p>
      <div class="name-results" id="nameResults">
        <p class="name-msg">ふりがなを入力すると候補が表示されます</p>
      </div>
    </div>

  </div>

  <!-- 共通 -->
  <div class="last-card">
    <label>最後に受付した会員</label>
    <p class="last-name"   id="lastName">—</p>
    <p class="last-member" id="lastMemberId"></p>
  </div>
  <p class="counter" id="counter">本日の受付: 0 件</p>
</div>

<footer id="versionFooter"></footer>

<div id="confirm-overlay">
  <div class="cf-box">
    <p class="cf-label">この会員を受付しますか？</p>
    <p class="cf-name" id="cfName"></p>
    <p class="cf-id"   id="cfId"></p>
    <div class="cf-btns">
      <button class="cf-ok"     onclick="confirmCheckin()">受付する</button>
      <button class="cf-cancel" onclick="cancelConfirm()">キャンセル</button>
    </div>
  </div>
</div>

<div id="result-overlay">
  <div class="ov-icon ok" id="ovIcon">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <p class="ov-label ok" id="ovLabel">受付完了</p>
  <p class="ov-name"     id="ovName"></p>
  <p class="ov-meta"     id="ovMeta"></p>
  <p class="ov-welcome"  id="ovWelcome">ご来校ありがとうございます！</p>
  <p class="ov-sub"      id="ovSub">記録中…</p>
  <p class="ov-hint">タップで閉じる</p>
  <div class="ov-progress" id="ovProgress"></div>
</div>

<div class="flash" id="flash"></div>

<!-- 50音キーボード（iPad専用・JS で生成） -->
<div id="kana-keyboard"><div class="kana-grid" id="kanaGrid"></div></div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
  const VERSION     = '2026.05.20-r29';
  const GAS_URL     = 'https://script.google.com/macros/s/AKfycbztpKZ4IqnsHPdtK_7Fin3Fa6loGudSSaORdXlmEGT5qowt1xRy3VryTsBxo7lF0wBUrw/exec';
  const OVERLAY_SEC = 3;

  document.getElementById('versionFooter').textContent = 'v' + VERSION;

  // ── 状態 ────────────────────────────────────────────
  let memberCache   = null;
  let lastScanned   = '';
  let cooldownUntil = 0;
  let scanCount     = 0;
  let dismissTimer  = null;
  let audioCtx      = null;
  let currentMode   = 'qr';
  let subMode       = 'num';
  let manualVal     = '';

  // ── 時計 ────────────────────────────────────────────
  const WD = ['日','月','火','水','木','金','土'];
  function updateClock() {
    const n = new Date();
    document.getElementById('hdDate').textContent =
      n.getFullYear() + '年' + String(n.getMonth()+1).padStart(2,'0') + '月' +
      String(n.getDate()).padStart(2,'0') + '日（' + WD[n.getDay()] + '）';
    document.getElementById('hdClock').textContent =
      String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  }
  updateClock();
  setInterval(updateClock, 1000);

  const IS_IPAD = window.innerWidth >= 768;

  // ── 50音キーボード ──────────────────────────────────
  const KANA_ROWS = [
    // 行    あ      か      さ      た      な      は      ま      や      ら      わ
    /*a*/ ['あ',  'か',  'さ',  'た',  'な',  'は',  'ま',  'や',  'ら',  'わ' ],
    /*i*/ ['い',  'き',  'し',  'ち',  'に',  'ひ',  'み',  null,  'り',  null ],
    /*u*/ ['う',  'く',  'す',  'つ',  'ぬ',  'ふ',  'む',  'ゆ',  'る',  null ],
    /*e*/ ['え',  'け',  'せ',  'て',  'ね',  'へ',  'め',  null,  'れ',  'を' ],
    /*o*/ ['お',  'こ',  'そ',  'と',  'の',  'ほ',  'も',  'よ',  'ろ',  'ん' ],
    /*sp*/['゛',  '゜',  'っ',  'ゃ',  'ゅ',  'ょ',  null,  null,  '⌫',  'クリア'],
  ];
  const DAKUTEN = {
    'か':'が','き':'ぎ','く':'ぐ','け':'げ','こ':'ご',
    'さ':'ざ','し':'じ','す':'ず','せ':'ぜ','そ':'ぞ',
    'た':'だ','ち':'ぢ','つ':'づ','て':'で','と':'ど',
    'は':'ば','ひ':'び','ふ':'ぶ','へ':'べ','ほ':'ぼ',
    'が':'か','ぎ':'き','ぐ':'く','げ':'け','ご':'こ',
    'ざ':'さ','じ':'し','ず':'す','ぜ':'せ','ぞ':'そ',
    'だ':'た','ぢ':'ち','づ':'つ','で':'て','ど':'と',
    'ば':'は','び':'ひ','ぶ':'ふ','べ':'へ','ぼ':'ほ',
  };
  const HANDAKUTEN = {
    'は':'ぱ','ひ':'ぴ','ふ':'ぷ','へ':'ぺ','ほ':'ぽ',
    'ぱ':'は','ぴ':'ひ','ぷ':'ふ','ぺ':'へ','ぽ':'ほ',
  };

  function buildKanaKeyboard() {
    const grid = document.getElementById('kanaGrid');
    KANA_ROWS.forEach(row => {
      row.forEach(ch => {
        const btn = document.createElement('button');
        if (ch === null) {
          btn.className = 'kana-key empty';
        } else if (ch === '⌫') {
          btn.className = 'kana-key kana-del';
          btn.textContent = ch;
          btn.onclick = () => {
            const el = document.getElementById('nameInput');
            el.value = el.value.slice(0, -1);
            onNameInput();
          };
        } else if (ch === 'クリア') {
          btn.className = 'kana-key kana-clr';
          btn.textContent = ch;
          btn.onclick = clearNameSearch;
        } else if (ch === '゛') {
          btn.className = 'kana-key special';
          btn.textContent = ch;
          btn.onclick = () => {
            const el = document.getElementById('nameInput');
            const last = el.value.slice(-1);
            if (DAKUTEN[last]) { el.value = el.value.slice(0,-1) + DAKUTEN[last]; onNameInput(); }
          };
        } else if (ch === '゜') {
          btn.className = 'kana-key special';
          btn.textContent = ch;
          btn.onclick = () => {
            const el = document.getElementById('nameInput');
            const last = el.value.slice(-1);
            if (HANDAKUTEN[last]) { el.value = el.value.slice(0,-1) + HANDAKUTEN[last]; onNameInput(); }
          };
        } else {
          btn.className = 'kana-key';
          btn.textContent = ch;
          btn.onclick = () => {
            document.getElementById('nameInput').value += ch;
            onNameInput();
          };
        }
        grid.appendChild(btn);
      });
    });
  }

  function setKanaKeyboard(visible) {
    if (!IS_IPAD) return;
    document.getElementById('kana-keyboard').classList.toggle('visible', visible);
    document.body.classList.toggle('kb-open', visible);
  }

  // ── モード切り替え ──────────────────────────────────
  function switchMode(mode) {
    currentMode = mode;
    document.getElementById('tabQr').classList.toggle('active', mode === 'qr');
    document.getElementById('tabManual').classList.toggle('active', mode === 'manual');
    document.getElementById('qrPanel').style.display     = mode === 'qr'     ? 'flex' : 'none';
    document.getElementById('manualPanel').style.display = mode === 'manual' ? 'flex' : 'none';

    if (mode === 'qr') {
      setKanaKeyboard(false);
      startCamera();
    } else {
      stopCamera();
      kClear();
      // 手入力モードでは名前検索を優先表示
      if (subMode !== 'name') switchSubMode('name');
      else setKanaKeyboard(true);
    }
  }

  // ── サブモード切り替え（番号 / 名前） ──────────────
  function switchSubMode(mode) {
    subMode = mode;
    document.getElementById('subTabNum').classList.toggle('active',  mode === 'num');
    document.getElementById('subTabName').classList.toggle('active', mode === 'name');
    document.getElementById('numPane').style.display  = mode === 'num'  ? 'flex' : 'none';
    document.getElementById('namePane').style.display = mode === 'name' ? 'flex' : 'none';
    if (mode === 'num') {
      document.getElementById('numPane').style.flexDirection = 'column';
      document.getElementById('numPane').style.gap = '12px';
      setKanaKeyboard(false);
    }
    if (mode === 'name') {
      setKanaKeyboard(true);
      if (!IS_IPAD) document.getElementById('nameInput').focus();
    }
  }

  // ── 会員キャッシュ ──────────────────────────────────
  async function warmupMembers() {
    try {
      const res = await fetch(GAS_URL + '?action=getAllMembers');
      const result = await res.json();
      if (result.success) {
        memberCache = result.members;
        const dot = document.getElementById('cacheDot');
        dot.classList.add('ready');
        dot.title = '会員データ ' + Object.keys(memberCache).length + '件 読込済';
      }
    } catch (_) {}
  }

  function findMember(memberId) {
    if (memberCache && memberCache[memberId]) {
      const m = memberCache[memberId];
      return m.lastName + '　' + m.firstName;
    }
    return null;
  }

  // ── 名前検索 ────────────────────────────────────────
  // カタカナ→ひらがな変換（検索時に統一）
  function toHira(str) {
    return str.replace(/[ァ-ヶ]/g, c =>
      String.fromCharCode(c.charCodeAt(0) - 0x60)
    );
  }
  // スペース正規化（全角→半角、連続→1つ）
  function normStr(str) {
    return toHira(str.replace(/　/g, ' ').replace(/\s+/g, ' ').trim().toLowerCase());
  }

  function searchMembers(query) {
    if (!memberCache || !query.trim()) return [];
    const terms = normStr(query).split(' ').filter(t => t.length > 0);
    if (!terms.length) return [];
    const results = [];
    for (const [id, m] of Object.entries(memberCache)) {
      // 「名（first name）」系フィールドを除外し、姓・姓かな・フルかな等のみ対象にする
      const fields = Object.entries(m)
        .filter(([key, val]) => {
          if (typeof val !== 'string' || !val) return false;
          const k = key.toLowerCase();
          // firstName / firstNameKana / mei / meiKana 等を除外
          return !(k.startsWith('first') || k.startsWith('mei') || k === 'name1' || k === 'namei');
        })
        .map(([, val]) => normStr(val));

      // 各検索ワードが「いずれかの姓フィールドの先頭」に一致するか（前方一致）
      const matched = terms.every(term =>
        fields.some(field => field.startsWith(term))
      );
      if (matched) results.push([id, m]);
    }
    return results.slice(0, 8);
  }

  // デバッグ: 会員データ構造を確認する関数（コンソールから呼べます）
  window.debugMember = function(name) {
    if (!memberCache) { console.log('キャッシュ未読込'); return; }
    const q = normStr(name);
    Object.entries(memberCache).forEach(([id, m]) => {
      const hay = normStr(Object.values(m).filter(v=>typeof v==='string').join(' '));
      if (hay.includes(q.split(' ')[0])) {
        console.log('--- 会員ID:', id);
        console.log('  フィールド:', JSON.stringify(m, null, 2));
        console.log('  検索文字列:', hay);
      }
    });
  };

  function getKana(m) {
    // よくあるフィールド名を試みる
    const last  = m.lastNameKana  || m.lastNameFurigana  || m.seiKana  || '';
    const first = m.firstNameKana || m.firstNameFurigana || m.meiKana  || '';
    if (last || first) return (last + '　' + first).trim();
    return m.nameKana || m.furigana || m.kana || '';
  }

  function renderNameResults(results) {
    const el = document.getElementById('nameResults');
    if (!results.length) {
      el.innerHTML = '<p class="name-msg">該当する会員が見つかりません</p>';
      return;
    }
    el.innerHTML = results.map(([id, m]) => {
      const name = (m.lastName || '') + '　' + (m.firstName || '');
      const kana = getKana(m);
      return `<div class="name-result" onclick="selectMember('${id}')">
        <div class="nr-name">${name}</div>
        ${kana ? `<div class="nr-kana">${kana}</div>` : ''}
        <div class="nr-id">会員番号：${id}</div>
      </div>`;
    }).join('');
  }

  function onNameInput() {
    const q = document.getElementById('nameInput').value;
    document.getElementById('nameClear').classList.toggle('show', q.length > 0);
    if (!q.trim()) {
      document.getElementById('nameResults').innerHTML =
        '<p class="name-msg">ふりがなを入力すると候補が表示されます</p>';
      return;
    }
    if (!memberCache) {
      document.getElementById('nameResults').innerHTML =
        '<p class="name-msg">会員データ読込中…</p>';
      return;
    }
    renderNameResults(searchMembers(q));
  }

  function clearNameSearch() {
    document.getElementById('nameInput').value = '';
    document.getElementById('nameClear').classList.remove('show');
    document.getElementById('nameResults').innerHTML =
      '<p class="name-msg">ふりがなを入力すると候補が表示されます</p>';
    document.getElementById('nameInput').focus();
  }

  let pendingMemberId = null;

  function selectMember(memberId) {
    const m = memberCache && memberCache[memberId];
    const name = m ? (m.lastName + '　' + m.firstName) : '（名前なし）';
    pendingMemberId = memberId;
    document.getElementById('cfName').textContent = name;
    document.getElementById('cfId').textContent   = '会員番号：' + memberId;
    document.getElementById('confirm-overlay').classList.add('visible');
  }

  async function confirmCheckin() {
    if (!pendingMemberId) return;
    const id = pendingMemberId;
    pendingMemberId = null;
    document.getElementById('confirm-overlay').classList.remove('visible');
    clearNameSearch();
    await processCheckin(id, '手入力（名前検索）');
  }

  function cancelConfirm() {
    pendingMemberId = null;
    document.getElementById('confirm-overlay').classList.remove('visible');
  }

  // ── QR解析 ──────────────────────────────────────────
  function extractMemberId(text) {
    const m = text.match(/\/r\/(\d{6})\/?$/);
    if (m) return m[1];
    if (/^\d{6}$/.test(text.trim())) return text.trim();
    return null;
  }

  // ── 音 ──────────────────────────────────────────────
  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function playBeep() {
    const ctx = getCtx(), osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(2000, ctx.currentTime);
    gain.gain.setValueAtTime(0.86, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.453);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
  }
  function playBass() {
    const ctx = getCtx(), osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.frequency.value = 60;
    gain.gain.setValueAtTime(2.0, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.3);
  }
  function playError() {
    const ctx = getCtx(), osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(300, ctx.currentTime);
    osc.frequency.setValueAtTime(180, ctx.currentTime + 0.18);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.45);
  }

  // ── フラッシュ ───────────────────────────────────────
  function flashScreen() {
    const el = document.getElementById('flash');
    el.classList.remove('active'); void el.offsetWidth; el.classList.add('active');
  }

  // ── オーバーレイ ─────────────────────────────────────
  const overlay = document.getElementById('result-overlay');

  function showOverlay({ name, meta, type = 'ok', sec = OVERLAY_SEC }) {
    const icon = document.getElementById('ovIcon');
    icon.className = 'ov-icon ' + type;
    icon.innerHTML = type === 'ok'
      ? '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'
      : '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

    const label = document.getElementById('ovLabel');
    label.textContent = type === 'ok' ? '受付完了' : 'エラー';
    label.className   = 'ov-label ' + type;

    document.getElementById('ovName').textContent      = name || '';
    document.getElementById('ovMeta').textContent      = meta || '';
    document.getElementById('ovWelcome').style.display = type === 'ok' ? '' : 'none';
    document.getElementById('ovSub').textContent       = '記録中…';

    icon.style.animation = 'none'; void icon.offsetWidth; icon.style.animation = '';

    const prog = document.getElementById('ovProgress');
    prog.style.setProperty('--dur', sec + 's');
    prog.classList.remove('run'); void prog.offsetWidth; prog.classList.add('run');

    overlay.classList.add('visible');
    clearTimeout(dismissTimer);
    dismissTimer = setTimeout(hideOverlay, sec * 1000);
  }

  function hideOverlay() {
    overlay.classList.remove('visible');
    clearTimeout(dismissTimer);
  }

  overlay.addEventListener('click', hideOverlay);

  // ── GAS送信 ──────────────────────────────────────────
  async function submitAttendance(memberId, fullName, note = '会員証QR') {
    const params = new URLSearchParams({
      action: 'submitAttendance',
      name: (fullName || '（名前なし）') + '　' + memberId,
      note
    });
    const res    = await fetch(GAS_URL + '?' + params);
    const result = await res.json();
    if (!result.success) throw new Error(result.message || '送信失敗');
  }

  // ── 受付共通処理 ─────────────────────────────────────
  async function processCheckin(memberId, note = '会員証QR') {
    const fullName = findMember(memberId) || '（名前なし）';

    document.getElementById('lastName').textContent     = fullName;
    document.getElementById('lastMemberId').textContent = '会員番号：' + memberId;
    scanCount++;
    document.getElementById('counter').textContent = '本日の受付: ' + scanCount + ' 件';

    flashScreen();
    if (navigator.vibrate) navigator.vibrate(200);
    getCtx().resume().then(() => { playBass(); playBeep(); });

    showOverlay({ name: fullName, meta: '会員番号：' + memberId, type: 'ok' });

    try {
      await submitAttendance(memberId, fullName, note);
      document.getElementById('ovSub').textContent = '✓ 記録完了';
    } catch (err) {
      document.getElementById('ovSub').textContent = '⚠ 記録に失敗しました';
    }
  }

  // ── QRスキャン処理 ───────────────────────────────────
  async function handleScan(rawText) {
    const memberId = extractMemberId(rawText);
    // 会員証QR以外は完全に無視
    if (!memberId) return;
    await processCheckin(memberId, '会員証QR');
  }

  // ── 手入力テンキー ───────────────────────────────────
  function kInput(d) {
    if (manualVal.length >= 6) return;
    manualVal += d;
    updateNumDisplay();
  }
  function kDel() {
    manualVal = manualVal.slice(0, -1);
    updateNumDisplay();
  }
  function kClear() {
    manualVal = '';
    updateNumDisplay();
  }

  function updateNumDisplay() {
    const el     = document.getElementById('numDigits');
    const nameEl = document.getElementById('numName');
    const hintEl = document.getElementById('numHint');
    const btn    = document.getElementById('btnSubmit');
    const len    = manualVal.length;

    const filled = manualVal.split('');
    const blanks = Array(6 - len).fill('_');
    el.textContent = [...filled, ...blanks].join(' ');
    el.classList.toggle('complete', len === 6);

    btn.disabled = len !== 6;

    if (len === 6) {
      const name = findMember(manualVal);
      if (name) {
        nameEl.textContent = name;
        nameEl.style.color = '#c0f0d0';
        hintEl.textContent = '「出席を記録」を押してください';
      } else {
        nameEl.textContent = '会員番号が見つかりません';
        nameEl.style.color = '#d06060';
        hintEl.textContent = memberCache ? '登録されていない番号です' : '会員データ読込中…';
      }
    } else {
      nameEl.textContent = '';
      hintEl.textContent = 'テンキーで入力してください';
    }
  }

  async function handleManualSubmit() {
    if (manualVal.length !== 6) return;
    const memberId = manualVal;
    kClear();
    await processCheckin(memberId, '手入力');
  }

  // ── カメラ ───────────────────────────────────────────
  const video  = document.getElementById('video');
  const canvas = document.createElement('canvas');
  const ctx2d  = canvas.getContext('2d');
  let facingMode    = 'environment';
  let currentStream = null;

  function stopCamera() {
    if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
  }

  async function startCamera() {
    stopCamera();
    try {
      currentStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 640 }, height: { ideal: 640 } }
      });
      video.srcObject = currentStream;
      video.addEventListener('loadedmetadata', () => {
        document.getElementById('status').textContent = '会員証QRをかざしてください';
        requestAnimationFrame(tick);
      }, { once: true });
    } catch (err) {
      document.getElementById('status').textContent = 'カメラにアクセスできません';
      document.getElementById('status').className = 'status error';
    }
  }

  function flipCamera() {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    startCamera();
  }

  function tick() {
    if (currentMode !== 'qr') return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx2d.drawImage(video, 0, 0);
      const imageData = ctx2d.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });
      const now = Date.now();
      if (code && (code.data !== lastScanned || now > cooldownUntil)) {
        lastScanned   = code.data;
        cooldownUntil = now + 3000;
        handleScan(code.data);
      }
    }
    requestAnimationFrame(tick);
  }

  // ── 起動 ─────────────────────────────────────────────
  warmupMembers();
  if (IS_IPAD) {
    // iPad：インカメラ初期設定・50音キーボード生成
    facingMode = 'user';
    document.getElementById('nameInput').setAttribute('inputmode', 'none'); // ネイティブキーボード抑制
    buildKanaKeyboard();
  }
  // 全デバイス共通：QRスキャンモードで起動
  startCamera();
</script>
</body>
</html>
